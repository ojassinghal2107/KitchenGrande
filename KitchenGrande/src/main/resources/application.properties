spring.application.name=KitchenGrande

# Dynamic port for cloud hosting (Railway uses the PORT variable)
server.port=${PORT:8080}

# Database Connection using Cloud Environment Variables
# These variables will be filled automatically by Railway
spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Production Settings
# 'update' ensures tables are created automatically on the new cloud DB
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Optional: Disable SQL logging in production for better performance
spring.jpa.show-sql=false

# Static file serving
spring.web.resources.static-locations=classpath:/static/